<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KJCS Portal</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#f8f3e7,#e8dcc2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:90%;
max-width:600px;
}

.card{
background:white;
border:3px solid #8b6b3f;
border-radius:20px;
padding:30px;
box-shadow:0 10px 20px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#4d3821;
margin-bottom:30px;
}

.button{
display:block;
text-decoration:none;
text-align:center;
padding:18px;
margin:15px 0;
background:#6b7f4f;
color:white;
font-size:18px;
border-radius:12px;
}

.button:hover{
opacity:.9;
}

.footer{
text-align:center;
margin-top:20px;
color:#555;
font-size:14px;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>KJCS Portal</h1>

<a class="button" onclick="enterRoom()">11th room</a>

<a class="button" href="https://docs.google.com/forms/" target="_blank">
Feedback
</a>

<a class="button" onclick="adminLogin()">
Admin
</a>

<div class="footer">
KJCS Student Portal
</div>

</div>

</div>

<script>
function enterRoom(){

const pass=prompt(
"11th room Password\n\nHint : 中学入学時の人数"
);

if(pass==="141"){
location.href="room.html";
}else{
alert("Password incorrect");
}

}

function adminLogin(){

const pass=prompt(
"Admin Password"
);

if(pass==="10139998kk"){
location.href="admin.html";
}else{
alert("Password incorrect");
}

}
</script>

</body>
</html>
